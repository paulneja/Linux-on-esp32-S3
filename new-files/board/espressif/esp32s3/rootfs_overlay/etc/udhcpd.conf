interface espap0
start 192.168.4.2
end 192.168.4.20
option subnet 255.255.255.0
option router 192.168.4.1
# Real public DNS -- forwarded through the NAT (S48nat) to espsta0 like any
# other traffic. The ESP32 itself doesn't run a DNS server.
option dns 1.1.1.1 8.8.8.8
lease_file /var/lib/misc/udhcpd.leases
pidfile /var/run/udhcpd.pid
